services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diagit
      POSTGRES_PASSWORD: diagit
      POSTGRES_DB: diagit
    ports:
      - "5434:5432"
    volumes:
      - diagit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagit -d diagit"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["dev"]

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: on-failure

  app:
    build:
      context: .
      target: runner
    # Ne pas conditionner le démarrage de l'app à la réussite des migrations :
    # si `migrate` échoue (base injoignable, mauvaise DATABASE_URL), l'app ne
    # démarrerait jamais et Traefik répondrait "no available server".
    # `migrate` tourne en parallèle et est relancé jusqu'à réussite.
    depends_on:
      migrate:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      # /api/sante répond 200 même si la base est injoignable.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/sante"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  diagit_pg_data:
