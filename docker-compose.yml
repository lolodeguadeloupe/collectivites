services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diagit
      POSTGRES_PASSWORD: diagit
      POSTGRES_DB: diagit
    ports:
      - "5434:5432"
    volumes:
      - diagit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagit -d diagit"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://diagit:diagit@db:5432/diagit?schema=public
    profiles: ["prod-like"]
  app:
    build:
      context: .
      target: runner
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://diagit:diagit@db:5432/diagit?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: http://localhost:3999
      NODE_ENV: production
    ports:
      - "3999:3000"
    profiles: ["prod-like"]

volumes:
  diagit_pg_data:
